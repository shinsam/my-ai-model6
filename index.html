<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 포즈 인식 인스펙터 by shin</title>
    <style>
        /* 깔끔하고 현대적인 다크 테마 스타일링 */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 500px;
            width: 100%;
        }

        /* 시작 버튼 스타일 */
        .btn-start {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
            margin-bottom: 25px;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.6);
        }

        /* 웹캠 화면 테두리 디자인 */
        #canvas-container {
            position: relative;
            border: 4px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            background-color: #000;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }

        /* 결과 창 및 글씨 크기 조절 */
        #label-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result-bar {
            background-color: #334155;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.3rem; /* 결과 글씨 크기 키움 */
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        /* 인식 확률이 가장 높은 핵심 결과 강조 */
        .highest {
            background-color: var(--accent-color);
            color: #0f172a;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Pose Predictor</h1>
        <p>티쳐블 머신 포즈 모델을 활용한 실시간 인식</p>
    </header>

    <div class="container">
        <button class="btn-start" type="button" onclick="init()">카메라 시작하기</button>
        
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
        
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    
    <script type="text/javascript">
        // ⚠️ 본인의 티쳐블 머신 모델 URL을 아래에 붙여넣으세요! (끝에 /가 있어야 합니다)
        const URL = "https://teachablemachine.withgoogle.com/models/f8n8V6--w/";
        
        let model, webcam, ctx, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // 모델 로딩 안내
            document.getElementById("label-container").innerHTML = "<div class='result-bar'>AI 모델을 불러오는 중...</div>";

            // 모델 로드
            model = await tmPose.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // 웹캠 설정
            const size = 300; // 웹캠 화면 크기 조절
            const flip = true; // 좌우 반전 여부
            webcam = new tmPose.Webcam(size, size, flip);
            await webcam.setup(); // 웹캠 접근 권한 요청
            await webcam.play();
            window.requestAnimationFrame(loop);

            // HTML 요소 준비
            const canvas = document.getElementById("canvas");
            canvas.width = size; canvas.height = size;
            ctx = canvas.getContext("2d");
            
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // 로딩 문구 제거
            for (let i = 0; i < maxPredictions; i++) {
                const div = document.createElement("div");
                div.className = "result-bar";
                labelContainer.appendChild(div);
            }
        }

        async function loop(timestamp) {
            webcam.update(); // 웹캠 프레임 업데이트
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            // 모델을 통해 포즈 예측 수행
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            // 가장 확률이 높은 클래스를 찾기 위한 변수
            let highestIndex = 0;
            let highestProb = 0;

            for (let i = 0; i < maxPredictions; i++) {
                const probability = prediction[i].probability.toFixed(2);
                if (probability > highestProb) {
                    highestProb = probability;
                    highestIndex = i;
                }
                
                // 기본 텍스트 출력 (클래스명 : 확률%)
                const className = prediction[i].className;
                const percentage = Math.round(probability * 100);
                labelContainer.childNodes[i].innerHTML = `<span>${className}</span> <span>${percentage}%</span>`;
                labelContainer.childNodes[i].classList.remove("highest");
            }

            // 가장 확률이 높은 항목에 특별한 하이라이트 CSS 스타일 추가 (확률 60% 이상일 때만)
            if (highestProb > 0.6) {
                labelContainer.childNodes[highestIndex].classList.add("highest");
            }

            // 웹캠 화면 및 포즈 스켈레톤(뼈대) 그리기
            drawPose(pose);
        }

        function drawPose(pose) {
            if (webcam.canvas) {
                ctx.drawImage(webcam.canvas, 0, 0);
                // 포즈의 뼈대와 점들을 그리기
                if (pose) {
                    const minPartConfidence = 0.5;
                    tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                    tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
                }
            }
        }
    </script>
</body>
</html>
